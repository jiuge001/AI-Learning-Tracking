<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="学习跟踪">
  <meta name="theme-color" content="#5B8DEF">
  <meta name="description" content="齐芛齐芃全科学习跟踪系统">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%235B8DEF'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='50'>📚</text></svg>">
  <title>学习跟踪 - 齐芛&amp;齐芃</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- ===== 顶部导航 ===== -->
<header class="app-header">
  <div class="logo">
    <span class="icon">📚</span>
    <span id="headerTitle">学习跟踪</span>
  </div>
  <div class="header-actions">
    <button class="header-btn" id="btnSync" title="云端同步">☁️</button>
    <button class="header-btn notification-dot" id="btnNotifications" title="通知">🔔</button>
    <button class="header-btn" id="btnExport" title="备份数据">💾</button>
    <button class="header-btn" id="btnImport" title="恢复数据">📥</button>
  </div>
</header>

<!-- ===== 主内容区 ===== -->
<div class="app-container" id="appContainer">

  <!-- 首页仪表盘 -->
  <div class="page active" id="page-dashboard">
    <div id="dashboardContent"></div>
  </div>

  <!-- 学生详情页 -->
  <div class="page" id="page-student">
    <div id="studentContent"></div>
  </div>

  <!-- 测验录入页 -->
  <div class="page" id="page-exam">
    <div id="examContent"></div>
  </div>

  <!-- 错题库页 -->
  <div class="page" id="page-errors">
    <div id="errorsContent"></div>
  </div>

  <!-- 薄弱点页 -->
  <div class="page" id="page-weakpoints">
    <div id="weakpointsContent"></div>
  </div>

  <!-- 练习题页 -->
  <div class="page" id="page-exercises">
    <div id="exercisesContent"></div>
  </div>

  <!-- 报告页 -->
  <div class="page" id="page-reports">
    <div id="reportsContent"></div>
  </div>

  <!-- 家长共管页 -->
  <div class="page" id="page-parents">
    <div id="parentsContent"></div>
  </div>

  <!-- 对比分析页 -->
  <div class="page" id="page-compare">
    <div id="compareContent"></div>
  </div>
</div>

<!-- ===== 底部导航 ===== -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-item active" data-page="dashboard">
    <span class="nav-icon">🏠</span>首页
  </button>
  <button class="nav-item" data-page="exam">
    <span class="nav-icon">📝</span>录入
  </button>
  <button class="nav-item" data-page="errors">
    <span class="nav-icon">📋</span>错题
  </button>
  <button class="nav-item" data-page="parents">
    <span class="nav-icon">👨‍👩‍👧</span>共管
  </button>
  <button class="nav-item" data-page="reports">
    <span class="nav-icon">📊</span>报告
  </button>
</nav>

<!-- ===== 导入文件隐藏input ===== -->
<input type="file" id="importFileInput" accept=".json" style="display:none">

<!-- ===== Toast容器 ===== -->
<div id="toastContainer"></div>

<!-- ===== 脚本 ===== -->
<script src="js/data-manager.js"></script>
<script src="js/chart-renderer.js"></script>
<script src="js/ocr-helper.js"></script>
<script src="js/app.js"></script>

<!-- ===== Service Worker ===== -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
